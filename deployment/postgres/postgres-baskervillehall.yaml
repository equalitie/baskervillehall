apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-baskervillehall
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-baskervillehall
  template:
    metadata:
      labels:
        app: postgres-baskervillehall
    spec:
      nodeSelector:
        kubernetes.io/hostname: postgres-node-73f188
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "postgres"
          effect: "NoSchedule"

      initContainers:
        - name: prestart-clean-shm
          image: busybox:1.36
          command: ["sh","-c","rm -f /dev/shm/PostgreSQL.* || true"]
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm

      volumes:
        - name: postgres-pv-storage
          persistentVolumeClaim:
            claimName: postgres-baskervillehall-pvc2
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi

      containers:
        - name: postgres
          image: postgres:11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-baskervillehall-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "500m"
              memory: "2Gi"

          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-pv-storage
            - mountPath: /dev/shm
              name: dshm

          startupProbe:
            exec:
              command: ["pg_isready","-U","postgres"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          readinessProbe:
            exec:
              command: ["pg_isready","-U","postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            exec:
              command: ["pg_isready","-U","postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6